name: Skimr Daily Digest

on:
  schedule:
    - cron: '0 4 * * *'  # 04:00 UTC = 08:00 Yerevan time
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: skimr-digest
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SEARCHAPI_KEY: ${{ secrets.SEARCHAPI_KEY }}
          WEBSHARE_PROXY_USERNAME: ${{ secrets.WEBSHARE_PROXY_USERNAME }}
          WEBSHARE_PROXY_PASSWORD: ${{ secrets.WEBSHARE_PROXY_PASSWORD }}
          SKIMR_MODEL_SUMMARIZE: gpt-5.4-mini
          SKIMR_MODEL_CLASSIFY: gpt-5.4-mini
          SKIMR_MODEL_SCORE: gpt-5.4-mini
          SKIMR_REASONING_SUMMARIZE: low
          SKIMR_REASONING_CLASSIFY: minimal
          SKIMR_REASONING_SCORE: medium
        run: uv run python -m pipeline.main

      - name: Commit DB and markdown
        run: |
          git config user.name "skimr-bot"
          git config user.email "skimr-bot@users.noreply.github.com"
          git add data/digest.db site/src/content/items/
          if git diff --quiet --cached; then
            echo "No changes to commit."
          else
            git commit -m "skimr: daily run $(date -u +'%Y-%m-%d')"
            git push
          fi

  build-and-deploy:
    needs: run-pipeline
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci || npm install

      - name: Build site
        working-directory: site
        run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - id: deployment
        uses: actions/deploy-pages@v4
